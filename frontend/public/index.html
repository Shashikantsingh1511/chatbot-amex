<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Amex Assistant</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="lang-toggle" id="langToggle">
    🌐 Language:
    <select id="langSelect">
      <option value="en">English</option>
      <option value="hi">हिन्दी</option>
    </select>
  </div>

  <div class="theme-toggle" id="themeToggle">🌓</div>
  <div class="chat-toggle" id="chatToggle">💬</div>

  <div class="chat-popup" id="chatPopup">
    <div class="chat-header">
      <div class="header-left">
        <img src="bot-avatar.png" class="avatar" />
        <span>Amex Assistant</span>
      </div>
      <div class="header-right">
        <button onclick="clearChat()" class="clear-btn">🗑️</button>
        <span id="closeBtn" class="close-btn">✖</span>
      </div>
    </div>

    <div id="chatbox" class="chat-box"></div>

    <div class="quick-options">
      <button onclick="sendQuick('What are the card options?')">Card Options</button>
      <button onclick="sendQuick('What are the eligibility criteria?')">Eligibility</button>
      <button onclick="sendQuick('Tell me about card charges')">Charges</button>
    </div>

    <form id="queryForm" class="chat-form">
      <input type="text" id="queryInput" placeholder="Ask your Amex question..." autocomplete="off" />
      <button type="submit">➤</button>
    </form>
  </div>

  <script>
    const themeToggle = document.getElementById('themeToggle');
    const chatPopup = document.getElementById('chatPopup');
    const chatToggle = document.getElementById('chatToggle');
    const closeBtn = document.getElementById('closeBtn');
    const form = document.getElementById('queryForm');
    const chatbox = document.getElementById('chatbox');
    const input = document.getElementById('queryInput');
    const langSelect = document.getElementById('langSelect');

    themeToggle.onclick = () => document.body.classList.toggle('light');

    // Load history & greeting flag
    window.addEventListener('load', () => {
      const saved = localStorage.getItem('chatHistory');
      if (saved) chatbox.innerHTML = saved;
    });

    const saveHistory = () => localStorage.setItem('chatHistory', chatbox.innerHTML);

    const addMessage = (text, sender) => {
      const msg = document.createElement('div');
      msg.className = `message ${sender}`;
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      bubble.innerText = text;
      msg.appendChild(bubble);
      chatbox.appendChild(msg);
      chatbox.scrollTop = chatbox.scrollHeight;
      saveHistory();
    };

    const sendQuick = (text) => {
      input.value = text;
      form.dispatchEvent(new Event('submit'));
    };

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const query = input.value.trim();
      if (!query) return;

      addMessage(query, 'user');
      input.value = '';

      const typing = document.createElement('div');
      typing.className = 'message bot typing';
      typing.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
      chatbox.appendChild(typing);
      chatbox.scrollTop = chatbox.scrollHeight;

      try {
        const lang = langSelect.value;
        const res = await fetch('/ask', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ query, lang })
        });

        const reader = res.body.getReader();
        let botMessage = '';
        typing.remove();

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          const chunk = new TextDecoder().decode(value);
          botMessage += chunk;
          if (chatbox.lastChild?.classList.contains('streaming')) {
            chatbox.lastChild.querySelector('.bubble').innerText = botMessage;
          } else {
            const streamMsg = document.createElement('div');
            streamMsg.className = 'message bot streaming';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.innerText = chunk;
            streamMsg.appendChild(bubble);
            chatbox.appendChild(streamMsg);
          }
          chatbox.scrollTop = chatbox.scrollHeight;
        }

        chatbox.lastChild.classList.remove('streaming');
        saveHistory();
      } catch (err) {
        typing.remove();
        addMessage("❗ Server error. Try again later.", 'bot');
      }
    });

    chatToggle.onclick = () => {
      chatPopup.style.display = 'flex';
      chatToggle.style.display = 'none';

      if (!sessionStorage.getItem('greeted')) {
        addMessage("Hi, I'm Amex Assistant. How may I help you today?", 'bot');
        sessionStorage.setItem('greeted', 'true');
      }
    };

    closeBtn.onclick = () => {
      chatPopup.style.display = 'none';
      chatToggle.style.display = 'block';
    };

    function clearChat() {
      chatbox.innerHTML = '';
      localStorage.removeItem('chatHistory');
      sessionStorage.removeItem('greeted');
    }
  </script>
</body>
</html>
